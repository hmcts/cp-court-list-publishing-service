spring:
  profiles:
    active: integration
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jms.JmsAutoConfiguration

common-platform-query-api:
  base-url: ${COMMON_PLATFORM_QUERY_API_BASE_URL:http://localhost:8080}

public-court-list:
  enabled: true
  court-list-data:
    path: ${PUBLIC_COURT_LIST_DATA_PATH:courtlist}
    accept-header: ${PUBLIC_COURT_LIST_ACCEPT_HEADER:application/vnd.courtlist.search.court.list+json}

azure:
  storage:
    enabled: false

# Disable authz and audit filters in integration tests
authz:
  http:
    enabled: false

audit:
  http:
    enabled: false
    openapi-rest-spec: court-list-publishing-api.openapi.yml

# Disable CP audit (Artemis) in integration tests
cp:
  audit:
    enabled: false

# Disable JMS health indicator and probes in integration tests
management:
  health:
    jms:
      enabled: false
  endpoint:
    health:
      probes:
        enabled: false

logging:
  level:
    root: INFO
    uk.gov.hmcts.cp: DEBUG
